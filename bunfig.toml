# bunfig.toml — Bun runtime + test configuration (Story 1.a.1).
#
# Test discovery:
#   * Por defeito `bun test` apanha "**/*.test.{ts,tsx,js,jsx,mts,cts}".
#   * Bash scripts em tests/integration/*.sh NÃO são apanhados (não match glob).
#   * Specs futuros vão em tests/<area>/<nome>.test.ts.
#
# Coverage thresholds AO-91 (architecture.md):
#   * Line ≥ 80% global
#   * Branch ≥ 85% em src/core/ (aplicado quando Story 1.a.4+ adicionar código)
#   * Configurado aqui mas só efectivo quando há specs com import de src/.

[test]
coverage = false
coverageThreshold = { line = 0.80, function = 0.80, statement = 0.80 }
coverageReporter = ["text"]
coverageDir = "coverage"
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "tests/**",
  "**/*.test.ts",
  "dist/**",
  ".smoke-evidence/**",
  "node_modules/**",
]

[install]
# Strict semver: lockfile committable (bun.lockb); reproducibilidade enforce no CI (Story 1.c.4).
exact = false
