# Override da META-ONDA 10 (Epic 7, Fase 2 — Story 7.18).
#
# Feature: passo de CODEGEN no orquestrador — endereça o achado F9 (o agente
# regenera o openapi.json à mão → drift inconvergível). Adiciona
# `Settings.codegen_command` + `make_sandbox_codegen` + param `codegen` no
# WaveOrchestrator: o nó verify roda o codegen no sandbox ANTES do verify_command,
# sobre o workspace (escrita in-place persiste até o commit), tornando os artefatos
# derivados (openapi.json) autoritativos por construção. Falha de codegen → loop de
# correção (como o verify).
#
# A onda mexe em orquestrador/settings (Python), NÃO na API → não toca openapi.json
# → converge limpa sob DoD + oracle (sem o drift que derrubou a onda 9).
#
# verify = DoD COMPLETO + ORACLE de aceitação (pytest /oracle). Oracle:
# /var/lib/hdd-oracles/codegen/test_oracle_codegen.py — dirige o WaveOrchestrator com
# fakes (offline), validado RED (main, 2 failed) / GREEN (referência, 3 passed).
#
# ⚠️ Esta onda BUILDA o codegen; ela roda sob o orquestrador ATUAL (sem codegen). Após
# o merge: rebuildar hdd-worker (F5) e setar HDD_CODEGEN_COMMAND no worker p/ ativar.
#
# Uso:
#   docker compose -p hdd_dev -f compose.yaml -f compose.meta.yaml -f compose.meta.onda10.yaml up -d
services:
  worker-meta:
    environment:
      HDD_ORACLE_DIR: /var/lib/hdd-oracles/codegen
      HDD_VERIFY_COMMAND: sh -c 'cd backend && ruff check . && MYPYPATH=src mypy && PYTHONPATH=src lint-imports && python -m pytest -q && PYTHONPATH=src python -m pytest /oracle -p no:cacheprovider -q'
      HDD_CLAUDE_TIMEOUT_S: "1200"
