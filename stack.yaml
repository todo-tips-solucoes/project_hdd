# Stack de produção (Docker Swarm) — Story 5.1.
#
# Deploy (no nó manager, com as variáveis do deploy.env carregadas):
#   set -a && . ./deploy.env && set +a
#   docker stack deploy -c stack.yaml hdd
#
# Pré-requisitos: secrets criados (docs/runbooks/secrets.md), imagens buildadas
# (hdd-api / hdd-worker / hdd-frontend) e DNS de $HDD_DOMAIN apontando para o nó.
# `docker stack deploy` NÃO lê .env automaticamente — exporte as variáveis antes.

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: hdd
      POSTGRES_DB: hdd
      POSTGRES_PASSWORD_FILE: /run/secrets/hdd_postgres_password
    secrets:
      - hdd_postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hdd -d hdd"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        # Volume local: fixa o Postgres no nó manager (1 nó no MVP).
        constraints: [node.role == manager]

  api:
    image: ${HDD_IMAGE_API:-hdd-api:latest}
    # Migrations idempotentes + uvicorn (--proxy-headers: HTTPS via Caddy).
    command:
      - sh
      - -c
      - alembic upgrade head && exec uvicorn hdd.api.app:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    environment:
      HDD_LLM_DRIVER: ${HDD_LLM_DRIVER:-subscription}
      HDD_LOG_LEVEL: ${HDD_LOG_LEVEL:-INFO}
      HDD_GITHUB_CLIENT_ID: ${HDD_GITHUB_CLIENT_ID:-}
      HDD_GITHUB_ALLOWLIST: ${HDD_GITHUB_ALLOWLIST:-}
      HDD_PANEL_BASE_URL: https://${HDD_DOMAIN}
      HDD_CORS_ORIGINS: https://${HDD_DOMAIN}
      HDD_CLIHELPER_BASE_URL: ${HDD_CLIHELPER_BASE_URL:-}
      # Story 6.8/ADR 0003: o resume na API faz `gh pr merge` ao aprovar o gate.
      HDD_REPO_SLUG: ${HDD_REPO_SLUG:-}
    secrets:
      - hdd_pg_dsn
      - hdd_session_secret
      - hdd_github_client_secret
      - hdd_clihelper_token
      - hdd_webhook_hmac_secret
      # GH_TOKEN do `gh pr merge` via secret (não env) — o entrypoint o exporta.
      - hdd_gh_token
    networks:
      - backend
      - edge
    depends_on:
      - postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  worker:
    image: ${HDD_IMAGE_WORKER:-hdd-worker:latest}
    environment:
      HDD_LLM_DRIVER: ${HDD_LLM_DRIVER:-subscription}
      HDD_LOG_LEVEL: ${HDD_LOG_LEVEL:-INFO}
      HDD_MODEL: ${HDD_MODEL:-}
      # Tokens (Claude Code + gh) NÃO vão por env — vêm de Docker secrets e são
      # exportados pelo entrypoint (Story 6.4 hardening; não vazam em docker inspect).
      # Story 6.9: malha de execução real (workspace por onda + verify no sandbox).
      # Sem HDD_REPO_URL o worker não provisiona workspace (verify defere ao gate).
      HDD_REPO_URL: ${HDD_REPO_URL:-}
      HDD_REPO_SLUG: ${HDD_REPO_SLUG:-}
      HDD_VERIFY_COMMAND: ${HDD_VERIFY_COMMAND:-pytest -q}
      HDD_SANDBOX_IMAGE: ${HDD_SANDBOX_IMAGE:-hdd-sandbox:latest}
      HDD_SANDBOX_NETWORK: ${HDD_SANDBOX_NETWORK:-none}
      # ⚠️ O workspace deve viver num caminho COMPARTILHADO host↔worker no MESMO
      # path: o `docker run -v <ws>:/workspace` do verify é resolvido pelo DAEMON
      # DO HOST, não pelo FS do container. O bind abaixo garante o mesmo caminho.
      HDD_WORKSPACE_ROOT: ${HDD_WORKSPACE_ROOT:-/var/lib/hdd-workspaces}
    volumes:
      # Socket do Docker: o nó `verify` faz `docker run` do sandbox (ADR 0004).
      # ⚠️ socket = controle do daemon = root-equivalente no host.
      - /var/run/docker.sock:/var/run/docker.sock
      # Workspaces efêmeros num caminho idêntico host↔worker (ver acima).
      - ${HDD_WORKSPACE_ROOT:-/var/lib/hdd-workspaces}:${HDD_WORKSPACE_ROOT:-/var/lib/hdd-workspaces}
    # uid 10001 acessa o socket sem rodar como root: HDD_DOCKER_GID = gid do grupo
    # `docker` no host (`getent group docker | cut -d: -f3`).
    group_add:
      - "${HDD_DOCKER_GID:-999}"
    secrets:
      - hdd_pg_dsn
      # Tokens via secret (exportados pelo entrypoint), não env.
      - hdd_gh_token
      - hdd_claude_oauth_token
    networks:
      - backend
    depends_on:
      - postgres
    deploy:
      # Teto global de claude -p é respeitado pela quota lease (Story 5.2),
      # então pode-se escalar replicas com segurança.
      replicas: ${HDD_WORKER_REPLICAS:-1}
      restart_policy:
        condition: on-failure

  frontend:
    image: ${HDD_IMAGE_FRONTEND:-hdd-frontend:latest}
    networks:
      - edge
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  caddy:
    image: caddy:2
    ports:
      # mode: host — bind direto no nó (ACME HTTP/TLS e HTTP/3).
      - {target: 80, published: 80, protocol: tcp, mode: host}
      - {target: 443, published: 443, protocol: tcp, mode: host}
      - {target: 443, published: 443, protocol: udp, mode: host}
    environment:
      HDD_DOMAIN: ${HDD_DOMAIN}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  edge:
  backend:

volumes:
  pgdata:
  caddy_data:
  caddy_config:

configs:
  caddyfile:
    file: ./ops/caddy/Caddyfile

secrets:
  hdd_pg_dsn:
    external: true
  hdd_session_secret:
    external: true
  hdd_github_client_secret:
    external: true
  hdd_clihelper_token:
    external: true
  hdd_webhook_hmac_secret:
    external: true
  hdd_postgres_password:
    external: true
  # Tokens de runtime (Story 6.4 hardening) — exportados pelo entrypoint.
  hdd_gh_token:
    external: true
  hdd_claude_oauth_token:
    external: true
