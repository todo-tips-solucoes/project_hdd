# Override da META-ONDA 12 (Epic 7, Fase 2) — PROVA do codegen full-stack.
#
# Primeira onda com HDD_CODEGEN_COMMAND FULL-STACK (backend + frontend). Fecha o gap
# de frontend de ponta a ponta: a onda muda a API (novo campo `merged` no
# HarnessSummary → openapi.json E api-types.ts mudam), mas o agente NÃO toca nenhum
# dos dois contratos — o codegen do sistema regenera ambos no loop, no meta-sandbox
# (agora com Node + openapi-typescript@7.13.0, PR #39).
#
# Prova: no gate, o CI "OpenAPI sem drift" E "Frontend (typegen-drift)" passam SEM
# nenhum passo manual de frontend (contraste com a onda 11, em que regenerei o
# api-types.ts à mão no gate).
#
# Requer hdd-meta-sandbox:latest COM Node (rebuildado pós-PR #39).
# verify = DoD + oracle (sem drift: o codegen deixa os dois contratos canônicos).
# Oracle: /var/lib/hdd-oracles/harness-merged (RED/GREEN validado).
#
# Uso:
#   docker compose -p hdd_dev -f compose.yaml -f compose.meta.yaml -f compose.meta.onda12.yaml up -d
services:
  worker-meta:
    environment:
      HDD_ORACLE_DIR: /var/lib/hdd-oracles/harness-merged
      HDD_CODEGEN_COMMAND: sh -c 'cd backend && PYTHONPATH=src python scripts/export_openapi.py openapi.json && cd .. && openapi-typescript backend/openapi.json -o frontend/src/lib/api-types.ts'
      HDD_VERIFY_COMMAND: sh -c 'cd backend && ruff check . && MYPYPATH=src mypy && PYTHONPATH=src lint-imports && python -m pytest -q && PYTHONPATH=src python -m pytest /oracle -p no:cacheprovider -q'
      HDD_CLAUDE_TIMEOUT_S: "1200"
