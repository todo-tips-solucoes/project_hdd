# Override da META-ONDA 15 (Epic 8) — driver `api` (RF-12: custo + tokens reais).
#
# Implementa o Caminho 1: o driver `api` é o MESMO agente `claude -p` do
# `subscription`, mas autenticado por ANTHROPIC_API_KEY (via env, nunca logada),
# o que faz a saída JSON reportar `usage` + `total_cost_usd` → tokens/custo reais
# no LlmResult. Escopo: ApiProvider.invoke + LlmResult(input/output_tokens,
# cost_usd) + settings.anthropic_api_key + factory.make_provider (chaveia por
# llm_driver) + metrics (hdd_llm_tokens_total/hdd_llm_cost_usd_total +
# record_llm_usage). Python-only — NÃO toca a API → sem drift de OpenAPI/frontend,
# logo SEM HDD_CODEGEN_COMMAND (modelo onda13/14, não onda12).
#
# A IMPLEMENTAÇÃO é offline: o oracle mocka subprocess.run → $0 de API. O uso AO
# VIVO sob llm_driver=api (que gasta $ real e exige a key nos secrets) é um gate
# SEPARADO, fora desta onda.
#
# verify = DoD completo + ORACLE de aceitação. Gate de "testes adicionados"
# LIGADO (onda de feature → exige teste novo/alterado). O worker já tem o gate
# -uall corrigido (meta-onda 14 mergeada), então é seguro ligá-lo.
# Oracle: /var/lib/hdd-oracles/api-driver (RED/GREEN validado fora do loop).
#
# Uso (projeto isolado hdd_dev, junto da postgres de dev do compose.yaml):
#   docker compose -p hdd_dev -f compose.yaml -f compose.meta.yaml -f compose.meta.epic8.yaml up -d
services:
  worker-meta:
    environment:
      HDD_ORACLE_DIR: /var/lib/hdd-oracles/api-driver
      HDD_VERIFY_COMMAND: sh -c 'cd backend && ruff check . && MYPYPATH=src mypy && PYTHONPATH=src lint-imports && python -m pytest -q && PYTHONPATH=src python -m pytest /oracle -p no:cacheprovider -q'
      HDD_REQUIRE_TESTS_GLOB: "*tests/*.py"
      HDD_CLAUDE_TIMEOUT_S: "1200"
