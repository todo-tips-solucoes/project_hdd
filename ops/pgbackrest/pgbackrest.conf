# pgBackRest — backup WAL + base + PITR para Cloudflare R2 (S3-compatível). Story 5.5.
#
# ⚠️ Credenciais R2 NÃO ficam aqui (repo público). Injete por ambiente/secret:
#     PGBACKREST_REPO1_S3_KEY         (R2 Access Key ID)
#     PGBACKREST_REPO1_S3_KEY_SECRET  (R2 Secret Access Key)
#   ou monte um arquivo de config extra só com essas duas chaves via Docker secret.
#
# Para validar o procedimento SEM R2: troque repo1-type=s3 por posix e
# repo1-path por um diretório local — ver ops/pgbackrest/test-pitr.sh (testado).

[global]
repo1-type=s3
repo1-s3-endpoint=<R2_ACCOUNT_ID>.r2.cloudflarestorage.com
repo1-s3-bucket=hdd-backups
repo1-s3-region=auto
repo1-s3-uri-style=path
# /hdd-boston: cluster da VPS dedicada (migração 2026-06-02). O cluster antigo
# (host compartilhado) tem outro system-id; seus backups ficam preservados em /hdd
# no mesmo bucket. Isolar por path evita conflito de stanza sem destruir o histórico.
repo1-path=/hdd-boston
# Retenção: 4 backups full; diferenciais expiram com o full pai.
repo1-retention-full=4
# Eficiência de armazenamento/transferência para R2.
compress-type=zst
repo1-bundle=y
start-fast=y
process-max=2
log-level-console=info
log-path=/var/log/pgbackrest

[hdd]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
# O cluster usa o role/db `hdd` (POSTGRES_USER/DB) — não existe role `postgres`.
pg1-user=hdd
pg1-database=hdd
