# Deploy via `docker compose` (sem Swarm) — usa o Traefik/host existente.
# Diferenças vs stack.yaml (Swarm): secrets como FICHEIROS (./secrets/), `restart:`
# em vez de `deploy:`, SEM o serviço caddy (o ingress fica a cargo do Traefik já
# presente, via labels — adicionar quando houver hostname/OAuth). A APLICAÇÃO é a
# mesma: lê /run/secrets/hdd_* igual ao Swarm. Zero alteração de código.
#
#   docker compose -f compose.prod.yaml up -d   # migrate roda uma vez; api/worker esperam-no
services:
  postgres:
    # Imagem pgvector + pgBackRest (Story 6.5): WAL archiving → R2.
    image: ${HDD_IMAGE_POSTGRES:-hdd-postgres:latest}
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - archive_command=pgbackrest --stanza=hdd archive-push %p
    environment:
      POSTGRES_USER: hdd
      POSTGRES_DB: hdd
      POSTGRES_PASSWORD_FILE: /run/secrets/hdd_postgres_password
      # Endpoint (account id) e bucket via env — não-segredos, do deploy.env.
      # As keys vêm de secrets (exportadas pelo entrypoint da imagem).
      PGBACKREST_REPO1_S3_ENDPOINT: ${PGBACKREST_REPO1_S3_ENDPOINT:-}
      PGBACKREST_REPO1_S3_BUCKET: ${PGBACKREST_REPO1_S3_BUCKET:-hdd-backups}
    secrets:
      - hdd_postgres_password
      - hdd_r2_access_key
      - hdd_r2_secret_key
    volumes:
      - hdd_pgdata:/var/lib/postgresql/data
      - ./ops/pgbackrest/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - hdd_pgbackrest_log:/var/log/pgbackrest
    networks: [hdd_backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hdd -d hdd"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Migration one-shot (Story 6.12). Roda `alembic upgrade head` UMA vez, num único
  # container, e sai. api/worker só sobem após ela completar (service_completed_
  # successfully). Antes a migration vivia no `command` da api → corrida se a api
  # escalasse além de 1 réplica (dívida do Epic 5). Idempotente: sai 0 se já em head.
  migrate:
    image: ${HDD_IMAGE_API:-hdd-api:latest}
    command: ["alembic", "upgrade", "head"]
    environment:
      HDD_LOG_LEVEL: ${HDD_LOG_LEVEL:-INFO}
    secrets:
      - hdd_pg_dsn
    networks: [hdd_backend]
    depends_on:
      postgres: {condition: service_healthy}
    restart: "no"

  api:
    image: ${HDD_IMAGE_API:-hdd-api:latest}
    # Só o servidor — a migration é responsabilidade do serviço `migrate` (6.12).
    command:
      - sh
      - -c
      - exec uvicorn hdd.api.app:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'
    environment:
      HDD_LOG_LEVEL: ${HDD_LOG_LEVEL:-INFO}
      HDD_REPO_SLUG: ${HDD_REPO_SLUG:-}
      # Painel + OAuth GitHub (Story 6.4 ingress). Same-origin: api e painel no
      # mesmo hostname → URLs relativas + cookie de sessão httpOnly.
      HDD_GITHUB_CLIENT_ID: ${HDD_GITHUB_CLIENT_ID:-}
      HDD_GITHUB_ALLOWLIST: ${HDD_GITHUB_ALLOWLIST:-}
      HDD_PANEL_BASE_URL: https://${HDD_DOMAIN}
      HDD_CORS_ORIGINS: https://${HDD_DOMAIN}
    secrets:
      - hdd_pg_dsn
      - hdd_session_secret
      - hdd_github_client_secret
      - hdd_clihelper_token
      - hdd_webhook_hmac_secret
      - hdd_gh_token          # gh pr merge ao aprovar o gate (entrypoint → GH_TOKEN)
    networks: [hdd_backend, hdd_edge]
    depends_on:
      postgres: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hdd_edge"
      # api responde às rotas de backend; o resto do hostname é o painel (frontend).
      - "traefik.http.routers.hdd-api.rule=Host(`${HDD_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/auth`) || PathPrefix(`/webhooks`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`) || PathPrefix(`/metrics`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`))"
      - "traefik.http.routers.hdd-api.entrypoints=websecure"
      - "traefik.http.routers.hdd-api.tls=true"
      - "traefik.http.routers.hdd-api.tls.certresolver=leresolver"
      - "traefik.http.routers.hdd-api.priority=100"
      - "traefik.http.services.hdd-api.loadbalancer.server.port=8000"
      # http→https
      - "traefik.http.routers.hdd-api-http.rule=Host(`${HDD_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/auth`) || PathPrefix(`/webhooks`) || PathPrefix(`/healthz`) || PathPrefix(`/readyz`) || PathPrefix(`/metrics`))"
      - "traefik.http.routers.hdd-api-http.entrypoints=web"
      - "traefik.http.routers.hdd-api-http.middlewares=hdd-https"
      - "traefik.http.middlewares.hdd-https.redirectscheme.scheme=https"

  worker:
    image: ${HDD_IMAGE_WORKER:-hdd-worker:latest}
    environment:
      HDD_LOG_LEVEL: ${HDD_LOG_LEVEL:-INFO}
      HDD_MODEL: ${HDD_MODEL:-}
      HDD_REPO_URL: ${HDD_REPO_URL:-}
      HDD_REPO_SLUG: ${HDD_REPO_SLUG:-}
      HDD_VERIFY_COMMAND: ${HDD_VERIFY_COMMAND:-pytest -q}
      HDD_SANDBOX_IMAGE: ${HDD_SANDBOX_IMAGE:-hdd-sandbox:latest}
      HDD_SANDBOX_NETWORK: ${HDD_SANDBOX_NETWORK:-none}
      HDD_WORKSPACE_ROOT: ${HDD_WORKSPACE_ROOT:-/var/lib/hdd-workspaces}
    secrets:
      - hdd_pg_dsn
      - hdd_gh_token            # abre PR (entrypoint → GH_TOKEN)
      - hdd_claude_oauth_token  # claude -p (entrypoint → CLAUDE_CODE_OAUTH_TOKEN)
    volumes:
      # verify faz `docker run` do sandbox no daemon do host (ADR 0004).
      - /var/run/docker.sock:/var/run/docker.sock
      # workspace num caminho idêntico host↔worker (o mount do sandbox é do host).
      - ${HDD_WORKSPACE_ROOT:-/var/lib/hdd-workspaces}:${HDD_WORKSPACE_ROOT:-/var/lib/hdd-workspaces}
    group_add:
      - "${HDD_DOCKER_GID:-998}"  # gid do grupo docker no host (acesso ao socket)
    networks: [hdd_backend]
    depends_on:
      postgres: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}
    restart: unless-stopped

  # Painel (Next.js standalone) — servido pelo Traefik no hostname; o login OAuth
  # e as chamadas à api são same-origin (URLs relativas via Traefik).
  frontend:
    image: ${HDD_IMAGE_FRONTEND:-hdd-frontend:latest}
    networks: [hdd_edge]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hdd_edge"
      # catch-all do hostname (prioridade < api → as rotas de backend vão à api).
      - "traefik.http.routers.hdd-fe.rule=Host(`${HDD_DOMAIN}`)"
      - "traefik.http.routers.hdd-fe.entrypoints=websecure"
      - "traefik.http.routers.hdd-fe.tls=true"
      - "traefik.http.routers.hdd-fe.tls.certresolver=leresolver"
      - "traefik.http.routers.hdd-fe.priority=1"
      - "traefik.http.services.hdd-fe.loadbalancer.server.port=3000"
      - "traefik.http.routers.hdd-fe-http.rule=Host(`${HDD_DOMAIN}`)"
      - "traefik.http.routers.hdd-fe-http.entrypoints=web"
      - "traefik.http.routers.hdd-fe-http.middlewares=hdd-https"

networks:
  hdd_backend:
  # Rede partilhada com o Traefik (conectar o Traefik a ela após o `up`):
  #   docker network connect hdd_edge traefik
  hdd_edge:
    name: hdd_edge

volumes:
  hdd_pgdata:
  hdd_pgbackrest_log:

secrets:
  hdd_pg_dsn: {file: ./secrets/hdd_pg_dsn}
  hdd_session_secret: {file: ./secrets/hdd_session_secret}
  hdd_github_client_secret: {file: ./secrets/hdd_github_client_secret}
  hdd_clihelper_token: {file: ./secrets/hdd_clihelper_token}
  hdd_webhook_hmac_secret: {file: ./secrets/hdd_webhook_hmac_secret}
  hdd_postgres_password: {file: ./secrets/hdd_postgres_password}
  hdd_gh_token: {file: ./secrets/hdd_gh_token}
  hdd_claude_oauth_token: {file: ./secrets/hdd_claude_oauth_token}
  hdd_r2_access_key: {file: ./secrets/hdd_r2_access_key}    # R2 Access Key ID (Story 6.5)
  hdd_r2_secret_key: {file: ./secrets/hdd_r2_secret_key}    # R2 Secret Access Key
