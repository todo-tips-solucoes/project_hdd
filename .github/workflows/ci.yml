name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint + Types + Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: ruff
        run: uv run ruff check .
      - name: mypy --strict
        run: uv run mypy
      - name: import-linter (boundaries hexagonais)
        run: uv run lint-imports
      - name: pytest (unit)
        run: uv run pytest

  integration:
    name: Integração (Postgres + pgvector)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: hdd
          POSTGRES_PASSWORD: hdd_dev
          POSTGRES_DB: hdd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hdd -d hdd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # A PoC (tests/test_poc.py) invoca `claude -p` (auth + quota) e fica fora do CI.
      HDD_PG_DSN: postgresql://hdd:hdd_dev@localhost:5432/hdd
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: migrations
        run: uv run alembic upgrade head
      - name: pytest (integração, exceto PoC)
        run: uv run pytest -m integration --ignore=tests/test_poc.py
