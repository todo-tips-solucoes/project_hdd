name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs supersedidos do mesmo ref (PR re-pushado) para poupar quota de CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Types + Unit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: ruff
        run: uv run ruff check .
      - name: mypy --strict
        run: uv run mypy
      - name: import-linter (boundaries hexagonais)
        run: uv run lint-imports
      - name: pytest (unit)
        run: uv run pytest

  integration:
    name: Integração (Postgres + pgvector)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: hdd
          POSTGRES_PASSWORD: hdd_dev
          POSTGRES_DB: hdd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hdd -d hdd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # A PoC (tests/test_poc.py) invoca `claude -p` (auth + quota) e fica fora do CI.
      HDD_PG_DSN: postgresql://hdd:hdd_dev@localhost:5432/hdd
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: migrations
        run: uv run alembic upgrade head
      - name: pytest (integração, exceto PoC)
        run: uv run pytest -m integration --ignore=tests/test_poc.py

  openapi-drift:
    name: OpenAPI sem drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: regenera o contrato a partir do código
        run: uv run python scripts/export_openapi.py openapi.json
      - name: contrato versionado == gerado (sem drift)
        run: |
          if ! git diff --exit-code openapi.json; then
            echo "::error::backend/openapi.json está desatualizado." \
                 "Rode 'uv run python scripts/export_openapi.py openapi.json' e commite."
            exit 1
          fi

  frontend:
    name: Frontend (lint + typegen-drift + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # O contrato OpenAPI versionado é a fonte; o build não fala com a API real.
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: lint
        run: npm run lint
      - name: typegen sem drift (tipos TS == OpenAPI versionado)
        run: |
          npm run typegen
          if ! git diff --exit-code src/lib/api-types.ts; then
            echo "::error::frontend/src/lib/api-types.ts está desatualizado." \
                 "Rode 'npm run typegen' e commite."
            exit 1
          fi
      - name: build (next, output standalone)
        run: npm run build

  deps:
    name: Scan de dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: pip-audit (deps de produção do backend)
        working-directory: backend
        run: |
          uv export --no-emit-project --no-dev --format requirements-txt > requirements-audit.txt
          uvx pip-audit --strict --requirement requirements-audit.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm audit (frontend, falha em high/critical)
        working-directory: frontend
        run: npm audit --audit-level=high

  docker-build:
    name: Build de imagens Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: backend — api
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: api
          push: false
          tags: hdd-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: backend — worker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: worker
          push: false
          tags: hdd-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
      - name: frontend — standalone
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: false
          tags: hdd-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
