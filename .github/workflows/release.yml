# release.yml — Story 1.c.4 (AR-017, NFR-P1, architecture.md:715-720).
#
# Produz o artifact do binário standalone (`bun build --compile`). Trigger
# DELIBERADO (Q-C4-3): push de tag `v*` ou disparo manual. NÃO faz deploy —
# o deploy é manual via SSH restrito (Story 1.c.5; architecture.md:720).

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # architecture.md:718 — falha o release se houver dep copyleft (GPL/AGPL/LGPL).
      - name: License check (fail on copyleft)
        run: bunx license-checker --production --failOn "GPL;AGPL;LGPL"

      # NFR-P1: binário standalone (entry real src/cli/hdd-worker.ts — Q-C4-2).
      - name: Build (compile standalone)
        run: bun build --compile src/cli/hdd-worker.ts --outfile dist/hdd-worker

      - name: Smoke (binário arranca sem Bun externo)
        run: ./dist/hdd-worker --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdd-worker-${{ github.ref_name }}
          path: dist/hdd-worker
          if-no-files-found: error
